<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewClaw — Chat</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/shared.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; }

    .app-layout { display: flex; flex: 1; overflow: hidden; position: relative; }

    /* ── Sidebar ─────────────────────────────────────────────── */
    .sidebar {
      width: 270px; background: var(--bg-surface); border-right: 1px solid var(--border-color);
      display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
      transition: width 0.22s ease, margin-left 0.22s ease;
    }
    .sidebar.collapsed { width: 0; margin-left: -270px; border-right: none; }
    .sidebar-inner { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 14px 12px 8px; gap: 12px; min-width: 270px; }

    .sidebar-top { display: flex; align-items: center; gap: 8px; }
    .btn-new-conv {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      height: 40px; border: none; border-radius: var(--radius-sm); cursor: pointer;
      background: var(--accent); color: #fff; font-family: inherit; font-size: 0.8125rem; font-weight: 700;
      box-shadow: var(--shadow-sm); transition: background 0.15s, box-shadow 0.15s;
    }
    .btn-new-conv:hover { background: var(--accent-hover); box-shadow: var(--shadow-md); }
    .btn-new-conv .plus { font-size: 1rem; line-height: 1; }
    .sidebar-collapse-btn {
      width: 36px; height: 36px; flex-shrink: 0; border-radius: var(--radius-sm); border: 1px solid var(--border-color-strong);
      background: transparent; color: var(--text-muted); cursor: pointer; font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .sidebar-collapse-btn:hover { color: var(--accent); border-color: var(--accent); }

    .sidebar-search {
      display: flex; align-items: center; gap: 8px; height: 36px; padding: 0 12px;
      border: 1px solid var(--border-color-strong); border-radius: var(--radius-sm); background: var(--bg-input);
      transition: border-color 0.15s;
    }
    .sidebar-search:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
    .sidebar-search .search-icon { font-size: 0.8rem; color: var(--text-soft); flex-shrink: 0; }
    .sidebar-search input {
      flex: 1; border: none; outline: none; background: transparent; color: var(--text-main);
      font-family: inherit; font-size: 0.8125rem; min-width: 0;
    }
    .sidebar-search input::placeholder { color: var(--text-soft); }

    .sidebar-section-label {
      display: flex; align-items: center; justify-content: space-between; padding: 2px 4px 0;
      font-size: 0.6875rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-soft);
    }
    .sidebar-tools { display: flex; gap: 2px; }
    .icon-ghost-sm {
      width: 24px; height: 24px; border: none; background: transparent; color: var(--text-soft);
      border-radius: 6px; cursor: pointer; font-size: 0.72rem; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .icon-ghost-sm:hover { background: var(--btn-icon-hover); color: var(--text-main); }

    .sidebar-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; margin: 0 -2px; padding: 0 2px; }
    .sidebar-item {
      padding: 9px 10px; border-radius: var(--radius-sm); cursor: pointer;
      color: var(--text-main); position: relative; border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .sidebar-item:hover { background: var(--bg-muted); }
    .sidebar-item.active { background: var(--accent-bg); border-color: var(--accent-border); }
    .sidebar-item.active .conv-title { color: var(--accent); }
    .sidebar-item .conv-title {
      font-size: 0.84375rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      padding-right: 20px;
    }
    .sidebar-item .conv-meta { font-size: 0.71875rem; color: var(--text-soft); margin-top: 2px; }
    .sidebar-item .conv-delete {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      opacity: 0; cursor: pointer; font-size: 0.72rem; padding: 3px 5px; border-radius: 5px; color: var(--text-soft);
    }
    .sidebar-item:hover .conv-delete { opacity: 1; }
    .sidebar-item .conv-delete:hover { background: var(--danger-bg); color: var(--danger); }
    .sidebar-empty { padding: 16px 8px; text-align: center; font-size: 0.78rem; color: var(--text-soft); }

    .sidebar-footer {
      display: flex; align-items: center; gap: 7px; padding: 10px 12px; margin-top: auto;
      border-top: 1px solid var(--border-color); font-size: 0.71875rem; color: var(--text-soft);
      font-family: var(--font-mono); flex-shrink: 0;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); flex-shrink: 0; box-shadow: 0 0 0 3px var(--success-bg); }
    .sidebar-footer b { color: var(--text-muted); font-weight: 600; }

    .sidebar-expand-btn {
      position: absolute; left: 10px; top: 10px; width: 34px; height: 34px; border-radius: var(--radius-sm);
      border: 1px solid var(--border-color-strong); background: var(--bg-surface); color: var(--text-muted);
      display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 15; box-shadow: var(--shadow-sm);
      font-size: 0.85rem;
    }
    .sidebar-expand-btn.visible { display: flex; }
    .sidebar-expand-btn:hover { color: var(--accent); border-color: var(--accent); }

    @media (max-width: 900px) {
      .sidebar { position: absolute; z-index: 20; height: 100%; box-shadow: var(--shadow-lg); }
      .sidebar.collapsed { margin-left: -270px; }
    }

    /* ── Chat ────────────────────────────────────────────────── */
    .chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .chat-scroll { flex: 1; overflow-y: auto; padding: 24px 24px 12px; }
    .chat-col { max-width: 768px; margin: 0 auto; min-height: 100%; display: flex; flex-direction: column; justify-content: flex-end; gap: 20px; }

    .date-divider { display: flex; align-items: center; justify-content: center; margin: 4px 0 6px; }
    .date-divider span {
      background: var(--bg-muted); color: var(--text-soft); font-size: 0.71875rem; font-weight: 600;
      padding: 4px 12px; border-radius: var(--radius-pill);
    }

    /* User message */
    .msg-row.user { display: flex; justify-content: flex-end; }
    .msg-bubble.user {
      max-width: 78%; background: var(--accent-bg); color: var(--text-main);
      padding: 11px 16px; border-radius: 20px; border-bottom-right-radius: 6px;
      font-size: 0.9375rem; line-height: 1.55; word-wrap: break-word;
    }
    .msg-bubble.user pre { background: var(--code-bg); padding: 8px 12px; border-radius: 8px; overflow-x: auto; font-size: 0.8rem; margin: 6px 0; font-family: var(--font-mono); }
    .msg-bubble.user code { background: var(--code-bg); padding: 1px 5px; border-radius: 4px; font-size: 0.82rem; font-family: var(--font-mono); }
    .msg-time { font-size: 0.6875rem; color: var(--text-soft); margin-top: 5px; text-align: right; }

    /* Agent message (no bubble) */
    .msg-row.agent { display: flex; gap: 12px; align-items: flex-start; }
    .msg-avatar {
      width: 28px; height: 28px; border-radius: var(--radius-avatar); flex-shrink: 0;
      background: linear-gradient(135deg, #1a73e8, #4c8dff); color: #fff;
      display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.78rem;
    }
    .msg-body-wrap { flex: 1; min-width: 0; }
    .msg-meta-line { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-soft); margin-bottom: 8px; }
    .msg-meta-line .msg-author { font-weight: 700; color: var(--text-main); }

    .reasoning-chip {
      display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; margin-bottom: 8px;
      background: var(--bg-muted); border-radius: var(--radius-pill); font-size: 0.75rem; color: var(--text-muted);
      cursor: pointer; user-select: none; transition: background 0.15s;
    }
    .reasoning-chip:hover { background: var(--btn-icon-hover); }
    .reasoning-chip-icon { color: var(--accent); }
    .reasoning-chevron { font-size: 0.7rem; transition: transform 0.15s; color: var(--text-soft); }
    .reasoning-chip.open .reasoning-chevron { transform: rotate(90deg); }
    .reasoning-body {
      max-height: 0; overflow: hidden; font-size: 0.8125rem; line-height: 1.55; color: var(--text-muted);
      background: var(--bg-muted); border-radius: var(--radius-sm); transition: max-height 0.2s ease, padding 0.2s ease, margin 0.2s ease;
      padding: 0 12px; margin-bottom: 0;
    }
    .reasoning-body.open { max-height: 320px; overflow-y: auto; padding: 10px 12px; margin-bottom: 8px; }

    .tool-card {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px; margin-bottom: 8px;
      background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius-sm);
      font-size: 0.8125rem; color: var(--text-main);
    }
    .tool-card-icon { font-size: 0.9rem; flex-shrink: 0; }
    .tool-card-label { font-weight: 600; }
    .tool-card-detail { color: var(--text-soft); font-family: var(--font-mono); font-size: 0.75rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tool-card-badge {
      margin-left: auto; flex-shrink: 0; font-size: 0.6875rem; font-weight: 700; letter-spacing: 0.03em;
      padding: 2px 8px; border-radius: 6px; font-family: var(--font-mono);
    }
    .tool-card-badge.ok { background: var(--success-bg); color: var(--success); }
    .tool-card-badge.err { background: var(--danger-bg); color: var(--danger); }

    .msg-content { font-size: 0.9375rem; line-height: 1.65; color: var(--text-main); word-wrap: break-word; }
    .msg-content .msg-h { font-size: 0.9375rem; font-weight: 800; margin: 12px 0 6px; }
    .msg-content .msg-h:first-child { margin-top: 0; }
    .msg-content pre { background: var(--code-bg); padding: 10px 14px; border-radius: 10px; overflow-x: auto; font-size: 0.8rem; margin: 8px 0; font-family: var(--font-mono); }
    .msg-content code { background: var(--code-bg); padding: 1px 5px; border-radius: 4px; font-size: 0.82rem; font-family: var(--font-mono); }
    .msg-content .msg-list { list-style: none; margin: 8px 0; padding: 0; counter-reset: msgList; }
    .msg-content .msg-list li { position: relative; padding-left: 30px; margin-bottom: 7px; }
    .msg-content .msg-list li::before {
      counter-increment: msgList; content: counter(msgList); position: absolute; left: 0; top: 1px;
      width: 18px; height: 18px; background: var(--accent-bg); color: var(--accent); border-radius: 5px;
      font-size: 0.6875rem; font-weight: 700; display: flex; align-items: center; justify-content: center;
    }

    .msg-attach { display: block; font-size: 0.78rem; opacity: 0.85; margin-top: 6px; }
    .msg-attach img { max-width: 220px; max-height: 220px; border-radius: 8px; display: block; margin-top: 4px; }
    .attach-tag { font-family: var(--font-mono); font-size: 0.625rem; font-weight: 700; background: var(--bg-muted); color: var(--text-muted); padding: 1px 5px; border-radius: 4px; margin-right: 4px; letter-spacing: 0.02em; }

    .msg-actions-row {
      display: flex; gap: 2px; margin-top: 8px; opacity: 0; transition: opacity 0.15s; pointer-events: none;
    }
    .msg-row.agent:hover .msg-actions-row { opacity: 1; pointer-events: auto; }
    .ghost-action-btn {
      border: none; background: transparent; color: var(--text-soft); font-family: inherit;
      font-size: 0.75rem; font-weight: 600; padding: 5px 9px; border-radius: 7px; cursor: pointer; transition: all 0.15s;
    }
    .ghost-action-btn:hover { background: var(--btn-icon-hover); color: var(--text-main); }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; flex: 1; gap: 8px; color: var(--text-soft); min-height: 100%;
    }
    .empty-state .icon {
      width: 44px; height: 44px; border-radius: var(--radius-avatar);
      background: linear-gradient(135deg, #1a73e8, #4c8dff); color: #fff; font-weight: 800; font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center; margin-bottom: 4px;
    }
    .empty-state h3 { color: var(--text-main); font-weight: 800; font-size: 1rem; }
    .empty-state p { font-size: 0.85rem; max-width: 340px; text-align: center; line-height: 1.5; }

    /* Status indicator */
    .status-indicator-slot { max-width: 768px; margin: 0 auto; padding: 0 24px; }
    #statusIndicator {
      display: none; align-items: center; gap: 8px; font-size: 0.78rem; color: var(--text-muted);
      padding: 6px 2px 10px;
    }

    /* ── Composer ────────────────────────────────────────────── */
    .composer-outer { padding: 8px 24px 16px; }
    .composer-wrap { max-width: 768px; margin: 0 auto; }
    .composer {
      border: 1px solid var(--border-color-strong); border-radius: var(--radius-pill); background: var(--bg-input);
      box-shadow: var(--shadow-sm); padding: 10px 12px 8px; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .composer:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
    .composer textarea {
      width: 100%; border: none; outline: none; background: transparent; color: var(--text-main);
      font-family: inherit; font-size: 0.9375rem; resize: none; min-height: 26px; max-height: 140px;
      line-height: 1.5; padding: 4px 8px;
    }
    .composer textarea::placeholder { color: var(--text-soft); }
    .composer-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 4px 4px 0; }
    .composer-toolbar-right { display: flex; align-items: center; gap: 6px; }
    .composer-icon-btn {
      width: 34px; height: 34px; border: none; border-radius: var(--radius-sm); cursor: pointer;
      background: transparent; color: var(--text-muted); font-size: 0.95rem;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0;
    }
    .composer-icon-btn:hover { background: var(--btn-icon-hover); color: var(--text-main); }
    .composer-icon-btn.active { background: var(--accent-bg); color: var(--accent); }
    .composer-icon-btn.mic.active { background: var(--danger-bg); color: var(--danger); animation: pulse 1.5s infinite; }
    .model-chip {
      display: flex; align-items: center; gap: 5px; height: 30px; padding: 0 11px;
      border: 1px solid var(--border-color-strong); border-radius: var(--radius-pill); background: transparent;
      color: var(--text-muted); font-size: 0.71875rem; font-weight: 700; white-space: nowrap;
    }
    .send-btn {
      width: 40px; height: 40px; border: none; border-radius: 12px; cursor: pointer; flex-shrink: 0;
      background: var(--accent); color: #fff; font-size: 1.05rem; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(26,115,232,0.35); transition: background 0.15s, transform 0.1s;
    }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:active { transform: scale(0.94); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
    .composer-hint { text-align: center; font-size: 0.6875rem; color: var(--text-soft); margin-top: 9px; }

    /* Attachments */
    .attach-preview { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 8px 8px; }
    .attach-chip {
      display: flex; align-items: center; gap: 6px; padding: 4px 8px 4px 4px;
      background: var(--bg-muted); border: 1px solid var(--border-color);
      border-radius: var(--radius-sm); font-size: 0.75rem; color: var(--text-muted); max-width: 220px;
    }
    .attach-chip img { width: 22px; height: 22px; object-fit: cover; border-radius: 4px; }
    .attach-chip .attach-icon { font-size: 1rem; }
    .attach-chip .attach-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .attach-chip .attach-remove { cursor: pointer; color: var(--text-soft); font-weight: bold; padding: 0 2px; }
    .attach-chip .attach-remove:hover { color: var(--danger); }

    .chat-main.drag-over::after {
      content: '📎 Solte o arquivo aqui';
      position: absolute; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      background: var(--accent-bg); outline: 3px dashed var(--accent); outline-offset: -6px;
      color: var(--accent); font-size: 1.1rem; font-weight: 700;
      pointer-events: none;
    }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    .listening-bar {
      display: none; padding: 5px 12px; margin: 0 8px 6px;
      background: var(--danger-bg); border-radius: var(--radius-sm);
      color: var(--danger); font-size: 0.75rem; font-weight: 600;
      animation: pulse 1.5s infinite;
    }
    .listening-bar.active { display: flex; align-items: center; gap: 4px; }

    /* Scrollbars */
    .chat-scroll::-webkit-scrollbar, .sidebar-list::-webkit-scrollbar, .reasoning-body::-webkit-scrollbar { width: 6px; }
    .chat-scroll::-webkit-scrollbar-track, .sidebar-list::-webkit-scrollbar-track { background: transparent; }
    .chat-scroll::-webkit-scrollbar-thumb, .sidebar-list::-webkit-scrollbar-thumb { background: var(--border-color-strong); border-radius: 3px; }

    @media (max-width: 640px) {
      .chat-scroll, .composer-outer { padding-left: 12px; padding-right: 12px; }
      .msg-bubble.user { max-width: 88%; }
    }
  </style>
</head>
<body>
  <!-- Header (injected by JS) -->
  <div id="header-root"></div>

  <div class="app-layout">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-top">
          <button class="btn-new-conv" onclick="newConversation()">
            <span class="plus">＋</span><span data-i18n="new_conv">Nova conversa</span>
          </button>
          <button class="sidebar-collapse-btn" onclick="toggleSidebar()" title="Recolher">‹</button>
        </div>

        <div class="sidebar-search">
          <span class="search-icon">🔍</span>
          <input type="text" id="sidebarSearch" data-i18n-placeholder="search_conv_placeholder" placeholder="Buscar conversas" oninput="filterSidebar(this.value)">
        </div>

        <div class="sidebar-section-label">
          <span data-i18n="conv_sidebar_title">Recentes</span>
          <div class="sidebar-tools">
            <button class="icon-ghost-sm" onclick="exportConversations()" title="Exportar">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M6 11l6 6 6-6"/><path d="M4 21h16"/></svg>
            </button>
            <button class="icon-ghost-sm" onclick="importConversations()" title="Importar">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V9"/><path d="M6 13l6-6 6 6"/><path d="M4 21h16"/></svg>
            </button>
          </div>
        </div>

        <div class="sidebar-list" id="sidebarList"></div>
      </div>
      <div class="sidebar-footer" id="sidebarStatusBar">
        <span class="status-dot"></span> <span data-i18n="agent_active_label">Agente ativo</span>
      </div>
    </div>
    <button class="sidebar-expand-btn" id="sidebarExpandBtn" onclick="toggleSidebar()" title="Expandir">›</button>

    <!-- Chat -->
    <div class="chat-main" id="chatMain">
      <div class="chat-scroll" id="chatContainer">
        <div class="chat-col" id="chatCol"></div>
      </div>
      <div class="status-indicator-slot" id="statusIndicatorSlot"></div>

      <div class="composer-outer">
        <div class="composer-wrap">
          <div class="composer" id="inputArea">
            <div class="listening-bar" id="listeningBar">🎤 Ouvindo...</div>
            <div class="attach-preview" id="attachPreview"></div>
            <input type="file" id="fileInput" style="display:none" multiple accept="image/*,audio/*,.pdf,.txt,.md,.doc,.docx,.csv,.json,.js,.ts,.tsx,.jsx,.py,.java,.c,.cpp,.h,.go,.rs,.rb,.php,.html,.css,.yml,.yaml,.xml,.sh,.log">
            <textarea id="messageInput" data-i18n-placeholder="msg_placeholder" placeholder="Pergunte ao NewClaw…" rows="1"></textarea>
            <div class="composer-toolbar">
              <button class="composer-icon-btn attach" id="attachBtn" onclick="document.getElementById('fileInput').click()" title="Anexar arquivo">＋</button>
              <div class="composer-toolbar-right">
                <button class="composer-icon-btn mic" id="micBtn" onclick="startVoiceInput()" data-i18n-title="mic_title" title="Falar">🎤</button>
                <button class="composer-icon-btn tts" id="ttsBtn" onclick="toggleTTS()" data-i18n-title="tts_title" title="Ouvir respostas">🔊</button>
                <div class="model-chip"><span>◇</span><span id="modelChipLabel">—</span></div>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" data-i18n-title="send_title" title="Enviar">↑</button>
              </div>
            </div>
          </div>
          <div class="composer-hint" data-i18n="composer_disclaimer">NewClaw pode cometer erros. Considere verificar informações importantes.</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/shared.js"></script>
  <script>
    // === Init header ===
    document.getElementById('header-root').innerHTML = newclawHeader('chat');
    newclawApplyI18n();

    // === State ===
    const SKEY = 'newclaw_';
    const SKEY_VERSION = 'v1_';

    // 1. Auto-migrate old keys (thorial_* → newclaw_v1_*)
    (function migrateKeys() {
      const oldPrefix = 'thorial_';
      const newPrefix = SKEY + SKEY_VERSION;
      let migrated = 0;
      Object.keys(localStorage).filter(k => k.startsWith(oldPrefix) && !k.startsWith(newPrefix)).forEach(k => {
        const newKey = k.replace(oldPrefix, newPrefix);
        if (!localStorage.getItem(newKey)) {
          localStorage.setItem(newKey, localStorage.getItem(k));
          migrated++;
        }
      });
      if (migrated) console.log(`[MIGRATE] ${migrated} keys migrated: ${oldPrefix}* → ${newPrefix}*`);
    })();

    let conversations = JSON.parse(localStorage.getItem(SKEY + SKEY_VERSION + 'conversations') || '[]');
    let currentConvId = localStorage.getItem(SKEY + SKEY_VERSION + 'current_conv') || null;
    let ttsEnabled = localStorage.getItem(SKEY + SKEY_VERSION + 'tts') === '1';
    let recognition = null;
    let isListening = false;
    let sidebarFilter = '';

    updateTTSIcon();

    // === Sidebar collapse (manual toggle, persisted) ===
    (function initSidebarState() {
      const stored = localStorage.getItem(SKEY + SKEY_VERSION + 'sidebar_collapsed');
      const shouldCollapse = stored === '1' || (stored === null && window.innerWidth < 900);
      if (shouldCollapse) {
        document.getElementById('sidebar').classList.add('collapsed');
        document.getElementById('sidebarExpandBtn').classList.add('visible');
      }
    })();
    function toggleSidebar() {
      const collapsed = document.getElementById('sidebar').classList.toggle('collapsed');
      document.getElementById('sidebarExpandBtn').classList.toggle('visible', collapsed);
      localStorage.setItem(SKEY + SKEY_VERSION + 'sidebar_collapsed', collapsed ? '1' : '0');
    }

    // === TTS ===
    function toggleTTS() {
      ttsEnabled = !ttsEnabled;
      localStorage.setItem(SKEY + SKEY_VERSION + 'tts', ttsEnabled ? '1' : '0');
      updateTTSIcon();
      if (!ttsEnabled) window.speechSynthesis.cancel();
    }
    function updateTTSIcon() {
      const btn = document.getElementById('ttsBtn');
      btn.textContent = ttsEnabled ? '🔊' : '🔇';
      btn.classList.toggle('active', ttsEnabled);
    }
    function speakText(text) {
      if (!ttsEnabled || !('speechSynthesis' in window) || !text) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'pt-BR'; u.rate = 1.0;
      const voices = window.speechSynthesis.getVoices();
      const ptVoice = voices.find(v => v.lang.startsWith('pt'));
      if (ptVoice) u.voice = ptVoice;
      window.speechSynthesis.speak(u);
    }
    if ('speechSynthesis' in window) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    // === Voice Input ===
    function startVoiceInput() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { alert('Reconhecimento de voz não suportado. Use Chrome ou Edge.'); return; }
      if (isListening) { recognition?.stop(); return; }
      recognition = new SR();
      recognition.lang = 'pt-BR'; recognition.interimResults = false; recognition.continuous = false;
      recognition.onstart = () => {
        isListening = true;
        document.getElementById('listeningBar').classList.add('active');
        document.getElementById('micBtn').classList.add('active');
      };
      recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;
        document.getElementById('messageInput').value = text;
        sendMessage();
      };
      recognition.onerror = (e) => { if (e.error !== 'no-speech') alert('Erro: ' + e.error); };
      recognition.onend = () => {
        isListening = false;
        document.getElementById('listeningBar').classList.remove('active');
        document.getElementById('micBtn').classList.remove('active');
      };
      recognition.start();
    }

    // === Sidebar ===
    function filterSidebar(q) { sidebarFilter = q.trim().toLowerCase(); renderSidebar(); }

    function renderSidebar() {
      const list = document.getElementById('sidebarList');
      const filtered = sidebarFilter
        ? conversations.filter(c => (c.title || '').toLowerCase().includes(sidebarFilter))
        : conversations;
      if (filtered.length === 0) {
        list.innerHTML = `<div class="sidebar-empty">${esc(t('no_conversations_found'))}</div>`;
        return;
      }
      list.innerHTML = filtered.map(c => `
        <div class="sidebar-item ${c.id === currentConvId ? 'active' : ''}" onclick="loadConversation('${c.id}')">
          <span class="conv-delete" onclick="event.stopPropagation(); deleteConversation('${c.id}')">✕</span>
          <div class="conv-title">${esc(c.title || 'Nova conversa')}</div>
          <div class="conv-meta">${c.messages?.length || 0} msgs · ${fmtTime(c.updatedAt)}</div>
        </div>`).join('');
    }
    function newConversation() {
      const c = { id: 'conv_' + Date.now(), title: 'Nova conversa', messages: [], createdAt: Date.now(), updatedAt: Date.now() };
      conversations.unshift(c); currentConvId = c.id; save(); renderSidebar(); renderChat();
    }

    // === Sync conversations with server DB ===
    async function syncFromServer() {
      try {
        const res = await newclawFetch('/api/conversations?userId=web-dashboard');
        const data = await res.json();
        if (!data.success) return;
        // Merge server convs into local (keep local if newer)
        for (const sc of data.conversations) {
          const local = conversations.find(c => c.id === sc.id);
          if (!local) {
            const msgRes = await fetch(`/api/conversations/${sc.id}/messages?limit=50`);
            const msgData = await msgRes.json();
            conversations.push({
              id: sc.id, title: sc.id, messages: (msgData.messages || []).map(m => ({role: m.role, content: m.content, timestamp: new Date(m.created_at).getTime()})),
              createdAt: new Date(sc.created_at).getTime(), updatedAt: new Date(sc.updated_at).getTime()
            });
          }
        }
        save(); renderSidebar();
      } catch (e) { console.warn('[SYNC] Failed:', e); }
    }

    // === Export/Import ===
    function exportConversations() {
      const blob = new Blob([JSON.stringify({conversations, exportedAt: new Date().toISOString()}, null, 2)], {type: 'application/json'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `newclaw-conversations-${new Date().toISOString().slice(0,10)}.json`;
      a.click(); URL.revokeObjectURL(a.href);
    }
    function importConversations() {
      const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
      input.onchange = e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const data = JSON.parse(ev.target.result);
            if (data.conversations) { conversations = data.conversations; save(); renderSidebar(); renderChat(); showToast('✅ Conversas importadas'); }
          } catch { showToast('❌ Arquivo inválido'); }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    function loadConversation(id) { currentConvId = id; localStorage.setItem(SKEY + SKEY_VERSION + 'current_conv', id); renderSidebar(); renderChat(); }
    function deleteConversation(id) {
      conversations = conversations.filter(c => c.id !== id);
      if (currentConvId === id) currentConvId = conversations[0]?.id || null;
      save(); renderSidebar(); renderChat();
    }
    function getConv() { return conversations.find(c => c.id === currentConvId); }
    function save() { localStorage.setItem(SKEY + SKEY_VERSION + 'conversations', JSON.stringify(conversations)); localStorage.setItem(SKEY + SKEY_VERSION + 'current_conv', currentConvId || ''); }

    // === Chat ===
    const chatContainer = document.getElementById('chatContainer');
    const chatCol = document.getElementById('chatCol');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    messageInput.addEventListener('input', () => { messageInput.style.height = 'auto'; messageInput.style.height = Math.min(messageInput.scrollHeight, 140) + 'px'; });
    messageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

    // === Attachments ===
    // Enviados como multipart/form-data (campo "files") — o backend classifica o tipo
    // (photo/audio/document) pelo mimetype e roda o mesmo pipeline usado por Telegram/Discord.
    const MAX_ATTACHMENTS = 5;
    const MAX_ATTACHMENT_BYTES = 20 * 1024 * 1024; // 20MB por arquivo (mesmo limite do multer no backend)
    let pendingAttachments = []; // { file, fileName, mimeType, type, previewUrl }

    function classifyAttachmentType(mimeType) {
      if (mimeType.startsWith('image/')) return 'photo';
      if (mimeType.startsWith('audio/')) return 'audio';
      return 'document';
    }
    function fileExt(name) {
      const m = /\.([a-z0-9]+)$/i.exec(name || '');
      return m ? m[1].toUpperCase().slice(0, 4) : 'FILE';
    }
    function addAttachment(file) {
      if (pendingAttachments.length >= MAX_ATTACHMENTS) { alert(`⚠️ Máximo de ${MAX_ATTACHMENTS} anexos por mensagem`); return; }
      if (file.size > MAX_ATTACHMENT_BYTES) { alert(`⚠️ Arquivo muito grande: ${file.name}`); return; }
      const mimeType = file.type || 'application/octet-stream';
      const type = classifyAttachmentType(mimeType);
      const previewUrl = type === 'photo' ? URL.createObjectURL(file) : null;
      pendingAttachments.push({ file, fileName: file.name, mimeType, type, previewUrl });
      renderAttachPreview();
    }
    function removeAttachment(idx) {
      const [removed] = pendingAttachments.splice(idx, 1);
      if (removed?.previewUrl) URL.revokeObjectURL(removed.previewUrl);
      renderAttachPreview();
    }
    function clearAttachments() {
      pendingAttachments.forEach(a => { if (a.previewUrl) URL.revokeObjectURL(a.previewUrl); });
      pendingAttachments = [];
      renderAttachPreview();
    }
    function renderAttachPreview() {
      const box = document.getElementById('attachPreview');
      box.innerHTML = pendingAttachments.map((a, idx) => `
        <div class="attach-chip">
          ${a.previewUrl ? `<img src="${a.previewUrl}">` : `<span class="attach-tag mono">${fileExt(a.fileName)}</span>`}
          <span class="attach-name" title="${esc(a.fileName)}">${esc(a.fileName)}</span>
          <span class="attach-remove" onclick="removeAttachment(${idx})">✕</span>
        </div>`).join('');
    }

    document.getElementById('fileInput').addEventListener('change', (e) => {
      Array.from(e.target.files).forEach(addAttachment);
      e.target.value = '';
    });

    // Drag and drop na janela do chat inteira (não só na barra de input, que é um alvo
    // pequeno demais). Bloqueia o comportamento padrão do browser (abrir o arquivo) em toda
    // a página, senão soltar fora da zona reconhecida navega a aba para o arquivo.
    const chatMain = document.getElementById('chatMain');
    let dragDepth = 0;
    ['dragenter', 'dragover', 'drop'].forEach(evt => window.addEventListener(evt, (e) => e.preventDefault()));
    chatMain.addEventListener('dragenter', (e) => {
      e.preventDefault();
      dragDepth++;
      chatMain.classList.add('drag-over');
    });
    chatMain.addEventListener('dragover', (e) => e.preventDefault());
    chatMain.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dragDepth = Math.max(0, dragDepth - 1);
      if (dragDepth === 0) chatMain.classList.remove('drag-over');
    });
    chatMain.addEventListener('drop', (e) => {
      e.preventDefault();
      dragDepth = 0;
      chatMain.classList.remove('drag-over');
      Array.from(e.dataTransfer?.files || []).forEach(addAttachment);
    });

    // Colar imagem/arquivo do clipboard
    messageInput.addEventListener('paste', (e) => {
      const fileItems = Array.from(e.clipboardData?.items || []).filter(it => it.kind === 'file');
      if (fileItems.length === 0) return;
      e.preventDefault();
      for (const item of fileItems) {
        const file = item.getAsFile();
        if (file) addAttachment(file);
      }
    });

    // === Reusable message sub-components ===
    function renderReasoningChip(m, idx) {
      if (!m.reasoning) return '';
      const seconds = typeof m.reasoning === 'object' ? m.reasoning.durationSec : null;
      const text = typeof m.reasoning === 'string' ? m.reasoning : (m.reasoning.text || '');
      const label = seconds != null ? t('reasoning_chip_label', { n: seconds }) : t('reasoning_chip_label_generic');
      const rid = `reasoning_${idx}`;
      return `<div class="reasoning-chip" onclick="toggleReasoningChip('${rid}', this)">
          <span class="reasoning-chip-icon">✦</span><span>${esc(label)}</span><span class="reasoning-chevron">›</span>
        </div>
        <div class="reasoning-body" id="${rid}">${esc(text)}</div>`;
    }
    function toggleReasoningChip(rid, chipEl) {
      chipEl.classList.toggle('open');
      document.getElementById(rid)?.classList.toggle('open');
    }
    function renderToolCards(m) {
      if (!m.toolCalls || !m.toolCalls.length) return '';
      return m.toolCalls.map(tc => `
        <div class="tool-card">
          <span class="tool-card-icon">📄</span>
          <span class="tool-card-label">${esc(tc.label || tc.name || '')}</span>
          ${tc.detail ? `<span class="tool-card-detail mono">${esc(tc.detail)}</span>` : ''}
          <span class="tool-card-badge ${tc.status === 'error' ? 'err' : 'ok'}">${tc.status === 'error' ? 'ERRO' : 'OK'}</span>
        </div>`).join('');
    }

    function renderChat() {
      const conv = getConv();
      if (!conv || conv.messages.length === 0) {
        chatCol.innerHTML = `<div class="empty-state"><div class="icon">N</div><h3>NewClaw está online</h3><p>Envie uma mensagem ou 🎤 fale para começar.</p></div>`;
        return;
      }
      const rows = conv.messages.map((m, idx) => {
        const time = new Date(m.timestamp).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
        const content = md(m.content);
        const attachHtml = (m.attachments || []).map(a =>
          `<span class="msg-attach">${a.type === 'photo' ? '🖼️' : a.type === 'audio' ? '🎵' : `<span class="attach-tag mono">${fileExt(a.fileName)}</span>`} ${esc(a.fileName)}</span>`
        ).join('');

        if (m.role === 'user') {
          return `<div class="msg-row user" data-idx="${idx}">
            <div class="msg-bubble user">${content}${attachHtml}<div class="msg-time">${time}</div></div>
          </div>`;
        }

        return `<div class="msg-row agent" data-idx="${idx}">
          <div class="msg-avatar">N</div>
          <div class="msg-body-wrap">
            <div class="msg-meta-line"><span class="msg-author">NewClaw</span><span>·</span><span>${time}</span></div>
            ${renderReasoningChip(m, idx)}
            ${renderToolCards(m)}
            <div class="msg-content">${content}${attachHtml}</div>
            <div class="msg-actions-row">
              <button class="ghost-action-btn" onclick="copyMsg(${idx})">Copiar</button>
              <button class="ghost-action-btn" onclick="regenerateMsg(${idx})">Refazer</button>
              <button class="ghost-action-btn" onclick="exportMsg(${idx})">Exportar</button>
            </div>
          </div>
        </div>`;
      }).join('');

      chatCol.innerHTML = `<div class="date-divider"><span>${esc(t('today_label'))}</span></div>` + rows;
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function copyMsg(idx) {
      const conv = getConv();
      if (!conv || !conv.messages[idx]) return;
      const text = conv.messages[idx].content;
      try {
        await navigator.clipboard.writeText(text);
        const btn = document.querySelector(`[data-idx="${idx}"] .ghost-action-btn`);
        if (btn) { const old = btn.textContent; btn.textContent = '✓'; setTimeout(() => { btn.textContent = old; }, 1500); }
      } catch (err) {
        // Fallback for non-HTTPS
        const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
      }
    }

    function exportMsg(idx) {
      const conv = getConv();
      if (!conv || !conv.messages[idx]) return;
      const m = conv.messages[idx];
      const blob = new Blob([m.content], { type: 'text/markdown' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `newclaw-msg-${new Date(m.timestamp).toISOString().slice(0,19).replace(/[:T]/g,'-')}.md`;
      a.click(); URL.revokeObjectURL(a.href);
    }

    async function regenerateMsg(idx) {
      const conv = getConv();
      if (!conv || !conv.messages[idx] || conv.messages[idx].role !== 'bot') return;
      let uIdx = idx - 1;
      while (uIdx >= 0 && conv.messages[uIdx].role !== 'user') uIdx--;
      if (uIdx < 0) return;
      const userMsg = conv.messages[uIdx];
      showStatus('thinking', t('status_thinking'));
      try {
        showStatus('sending', t('status_sending'));
        const formData = new FormData();
        formData.append('message', userMsg.content);
        formData.append('sessionId', currentConvId || 'web-session');
        const res = await newclawFetch('/api/chat', { method: 'POST', body: formData });
        showStatus('receiving', t('status_receiving'));
        const data = await res.json();
        hideStatus();
        const response = data.error ? `⚠️ Erro: ${data.error}` : (data.response || '...');
        conv.messages[idx] = { role: 'bot', content: response, timestamp: Date.now() };
        conv.updatedAt = Date.now();
        save(); renderChat(); renderSidebar();
        speakText(response.replace(/```[\s\S]*?```/g,'(código)').replace(/[*#`_]/g,'').slice(0,500));
      } catch (err) { hideStatus(); }
    }

    function addMsg(role, content, attachments) {
      if (!currentConvId) newConversation();
      const conv = getConv(); if (!conv) return;
      conv.messages.push({role, content, timestamp: Date.now(), attachments: attachments && attachments.length ? attachments : undefined});
      conv.updatedAt = Date.now();
      if (role === 'user' && conv.messages.filter(m => m.role === 'user').length === 1) {
        conv.title = content.slice(0, 50) + (content.length > 50 ? '...' : '');
      }
      save(); renderChat(); renderSidebar();
    }

    async function sendMessage() {
      const msg = messageInput.value.trim();
      const attachments = pendingAttachments;
      if (!msg && attachments.length === 0) return;
      addMsg('user', msg || '📎 (anexo)', attachments.map(a => ({ fileName: a.fileName, type: a.type })));
      messageInput.value = ''; messageInput.style.height = 'auto'; sendBtn.disabled = true;
      clearAttachments();
      showStatus('thinking', t('status_thinking'));
      try {
        showStatus('sending', t('status_sending'));
        const formData = new FormData();
        formData.append('message', msg);
        formData.append('sessionId', currentConvId || 'web-session');
        attachments.forEach(a => formData.append('files', a.file, a.fileName));
        // Sem header Content-Type: o browser define o boundary multipart automaticamente.
        const res = await newclawFetch('/api/chat', { method: 'POST', body: formData });
        showStatus('receiving', t('status_receiving'));
        const data = await res.json();
        hideStatus();
        const response = data.error ? `⚠️ Erro: ${data.error}` : (data.response || '...');
        addMsg('bot', response);
        speakText(response.replace(/```[\s\S]*?```/g,'(código)').replace(/[*#`_]/g,'').slice(0,500));
      } catch (err) { hideStatus(); addMsg('bot', `⚠️ Falha: ${err.message}`); }
      sendBtn.disabled = false; messageInput.focus();
    }

    // ── Status indicator ──
    function showStatus(type, text) {
      let indicator = document.getElementById('statusIndicator');
      if (!indicator) {
        indicator = document.createElement('div');
        indicator.id = 'statusIndicator';
        document.getElementById('statusIndicatorSlot').appendChild(indicator);
      }
      const icons = { thinking: '🤔', sending: '📡', receiving: '📥', processing: '⚙️', tool: '🔧', error: '❌' };
      indicator.innerHTML = `<span>${icons[type]||'⏳'}</span> ${text}`;
      if (type === 'thinking' || type === 'processing' || type === 'tool') {
        indicator.innerHTML += ' <span class="typing-dots" style="display:inline-block;width:20px;text-align:left;">.</span>';
        let dots = 0;
        clearInterval(indicator._dotInterval);
        indicator._dotInterval = setInterval(() => {
          dots = (dots + 1) % 4;
          indicator.querySelector('.typing-dots').textContent = '.'.repeat(dots);
        }, 400);
      } else {
        clearInterval(indicator?._dotInterval);
      }
      indicator.style.display = 'flex';
    }
    function hideStatus() {
      const indicator = document.getElementById('statusIndicator');
      if (indicator) { clearInterval(indicator._dotInterval); indicator.style.display = 'none'; }
    }

    // Markdown mínimo: escapa HTML antes de aplicar as transformações (o texto do
    // usuário/bot nunca deve virar markup executável), depois protege blocos de código
    // da conversão de listas/quebras de linha.
    function md(text) {
      const blocks = [];
      let out = String(text).replace(/```(\w*)\n?([\s\S]*?)```/g, (_m, _lang, code) => {
        blocks.push(`<pre><code>${esc(code)}</code></pre>`);
        return `@@CODEBLOCK${blocks.length - 1}@@`;
      });
      out = esc(out);
      out = out.replace(/`([^`]+)`/g, '<code>$1</code>');
      out = out.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      out = out.replace(/^#{1,3} (.+)$/gm, '<div class="msg-h">$1</div>');
      out = out.replace(/(?:^\d+\.\s.+$\n?)+/gm, block => {
        const items = block.trim().split('\n').map(l => `<li>${l.replace(/^\d+\.\s/, '')}</li>`).join('');
        return `<ol class="msg-list">${items}</ol>`;
      });
      out = out.replace(/\n/g, '<br>');
      out = out.replace(/@@CODEBLOCK(\d+)@@/g, (_m, i) => blocks[Number(i)]);
      return out;
    }
    function esc(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
    function fmtTime(ts) { if(!ts) return ''; const d=new Date(ts),n=new Date(); return d.toDateString()===n.toDateString() ? d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}); }
    function showToast(msg) {
      let toast = document.getElementById('newclawToast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'newclawToast';
        toast.style.cssText = 'position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--bg-surface);color:var(--text-main);border:1px solid var(--border-color-strong);box-shadow:var(--shadow-md);padding:9px 16px;border-radius:var(--radius-pill);font-size:0.8125rem;font-weight:600;z-index:99998;transition:opacity 0.2s;';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.style.opacity = '1';
      clearTimeout(toast._hideTimer);
      toast._hideTimer = setTimeout(() => { toast.style.opacity = '0'; }, 2500);
    }

    // === Init ===
    // Sync from server DB on startup, then init
    syncFromServer().finally(() => {
      if (conversations.length === 0) newConversation(); else {
        if (!currentConvId || !conversations.find(c => c.id === currentConvId)) currentConvId = conversations[0].id;
        renderSidebar(); renderChat();
      }
    });
    newclawFetch('/api/config').then(r=>r.json()).then(d=>{ if(d.success) document.querySelector('.newclaw-header-subtitle')?.remove(); });

    // ── Sidebar footer + composer model chip (status polling) ──
    function updateStatusUI(s) {
      const bar = document.getElementById('sidebarStatusBar');
      const uptime = s.uptimeHuman || '—';
      const heapMb = (Number(s.memory?.heapUsed?.replace(' MB','')) || 0).toFixed(0);
      bar.innerHTML = `<span class="status-dot"></span> <span data-i18n="agent_active_label">${t('agent_active_label')}</span> · ${uptime} · ${heapMb} MB`;
      const modelLabel = document.getElementById('modelChipLabel');
      if (modelLabel && s.model) modelLabel.textContent = s.model;
    }
    function pollStatus() {
      newclawFetch('/api/status').then(r=>r.json()).then(d => { if (d.success) updateStatusUI(d.status); }).catch(() => {});
    }
    pollStatus();
    setInterval(pollStatus, 30000);

    messageInput.focus();
  </script>
</body>
</html>
