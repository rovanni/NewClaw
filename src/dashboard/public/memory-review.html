<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewClaw - Memory Review</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/shared.css">
  <style>
    .main { max-width: 1280px; margin: 0 auto; padding: 24px; }
    .hero { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 20px; }
    .hero h1 { font-size: 1.4rem; color: var(--text-main); }
    .hero p { color: var(--text-muted); margin-top: 6px; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      padding: 10px 14px; border-radius: 6px; border: 1px solid var(--border-color);
      background: var(--bg-input); color: var(--text-main); cursor: pointer; font-size: 0.84rem;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-danger { border-color: #f87171; color: #f87171; }
    .btn-danger:hover { background: rgba(248,113,113,0.12); border-color: #ef4444; color: #ef4444; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 8px; padding: 16px; }
    .stat-label { font-size: 0.72rem; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-value { font-size: 1.35rem; font-weight: 700; color: var(--accent); margin-top: 4px; }
    .stat-sub { font-size: 0.72rem; color: var(--text-soft); margin-top: 2px; }
    .grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 20px; }
    .section-title { font-size: 0.94rem; color: var(--accent); font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .section-count { font-size: 0.74rem; color: var(--text-soft); font-weight: 400; }
    .list { display: flex; flex-direction: column; gap: 10px; max-height: 520px; overflow-y: auto; padding-right: 4px; }
    .item { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; transition: border-color 0.15s; }
    .item:hover { border-color: var(--accent); }
    .item-title { font-size: 0.82rem; color: var(--text-main); font-weight: 600; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
    .item-detail { font-size: 0.74rem; color: var(--text-soft); margin-top: 4px; }
    .pill {
      display: inline-block; font-size: 0.65rem; border-radius: 999px; padding: 2px 7px;
      font-weight: 600; letter-spacing: 0.03em;
    }
    .pill-orphan { color: #fb923c; background: rgba(251,146,60,0.15); }
    .pill-sparse  { color: #facc15; background: rgba(250,204,21,0.13); }
    .pill-dup     { color: var(--accent); background: var(--accent-bg); }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .empty { color: var(--text-soft); padding: 18px 0; font-size: 0.84rem; }
    .loading { color: var(--text-soft); padding: 24px 0; font-size: 0.84rem; display: flex; align-items: center; gap: 10px; }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border-color); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-banner { background: rgba(239,68,68,0.1); border: 1px solid #f87171; border-radius: 8px; padding: 12px 16px; color: #f87171; font-size: 0.84rem; margin-bottom: 16px; display: none; }
    .toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--bg-surface);
      border: 1px solid var(--border-color); border-radius: 8px; padding: 12px 18px;
      font-size: 0.84rem; color: var(--text-main); z-index: 9999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35); opacity: 0; transition: opacity 0.2s;
      max-width: 320px;
    }
    .toast.show { opacity: 1; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } .hero { flex-direction: column; align-items: flex-start; } }
  </style>
</head>
<body>
  <div id="header-root"></div>
  <div class="main">
    <div class="hero">
      <div>
        <h1>Revisão da Memória</h1>
        <p>Fila de manutenção para nós órfãos, sparse e possíveis duplicatas.</p>
      </div>
      <div class="btn-row">
        <button class="btn" id="refreshBtn" onclick="loadReview()">Atualizar</button>
        <a class="btn" href="/memory-graph" style="text-decoration:none;">Abrir Grafo</a>
      </div>
    </div>

    <div id="errorBanner" class="error-banner"></div>
    <div class="stats" id="statsRow"></div>

    <div class="grid">
      <div class="card">
        <div class="section-title">
          Fila de Revisão
          <span class="section-count" id="issuesCount"></span>
        </div>
        <div class="list" id="issuesList">
          <div class="loading"><div class="spinner"></div> Carregando...</div>
        </div>
      </div>
      <div class="card">
        <div class="section-title">
          Possíveis Duplicatas
          <span class="section-count" id="duplicatesCount"></span>
        </div>
        <div class="list" id="duplicatesList">
          <div class="loading"><div class="spinner"></div> Carregando...</div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/shared.js"></script>
  <script>
    document.getElementById('header-root').innerHTML = newclawHeader('memory-review');
    newclawInitTheme();

    let reviewData = null;

    function esc(t) {
      const d = document.createElement('div');
      d.textContent = String(t || '');
      return d.innerHTML;
    }

    function showToast(msg, duration = 3000) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(el._timer);
      el._timer = setTimeout(() => el.classList.remove('show'), duration);
    }

    function showError(msg) {
      const el = document.getElementById('errorBanner');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorBanner').style.display = 'none';
    }

    function qualityText(score) {
      if (score >= 80) return 'Memória bem conectada';
      if (score >= 60) return 'Boa base com ajustes';
      if (score >= 40) return 'Precisa de manutenção';
      return 'Muita memória solta';
    }

    function qualityColor(score) {
      if (score >= 70) return '#4ade80';
      if (score >= 45) return '#facc15';
      return '#f87171';
    }

    async function loadReview() {
      hideError();
      document.getElementById('refreshBtn').disabled = true;
      document.getElementById('issuesList').innerHTML = '<div class="loading"><div class="spinner"></div> Carregando...</div>';
      document.getElementById('duplicatesList').innerHTML = '<div class="loading"><div class="spinner"></div> Carregando...</div>';
      try {
        const r = await newclawFetch('/api/memory/review');
        const d = await r.json();
        if (!d.success) { showError('Falha ao carregar revisão: ' + (d.error || 'erro desconhecido')); return; }
        reviewData = d.review;
        renderReview();
      } catch (e) {
        showError('Erro de comunicação com o servidor: ' + (e.message || e));
        document.getElementById('issuesList').innerHTML = '<div class="empty">Sem dados.</div>';
        document.getElementById('duplicatesList').innerHTML = '<div class="empty">Sem dados.</div>';
      } finally {
        document.getElementById('refreshBtn').disabled = false;
      }
    }

    function renderReview() {
      if (!reviewData) return;
      const s = reviewData.summary;

      document.getElementById('statsRow').innerHTML = `
        <div class="card">
          <div class="stat-label">Score</div>
          <div class="stat-value" style="color:${qualityColor(s.qualityScore)}">${s.qualityScore}</div>
          <div class="stat-sub">${qualityText(s.qualityScore)}</div>
        </div>
        <div class="card">
          <div class="stat-label">Total de nós</div>
          <div class="stat-value">${s.totalNodes}</div>
          <div class="stat-sub">${s.totalEdges} relações</div>
        </div>
        <div class="card">
          <div class="stat-label">Nós órfãos</div>
          <div class="stat-value">${s.orphanCount}</div>
          <div class="stat-sub">sem nenhuma relação</div>
        </div>
        <div class="card">
          <div class="stat-label">Nós sparse</div>
          <div class="stat-value">${s.sparseCount}</div>
          <div class="stat-sub">conteúdo ou grau baixo</div>
        </div>
        <div class="card">
          <div class="stat-label">Duplicatas</div>
          <div class="stat-value">${s.duplicateCount}</div>
          <div class="stat-sub">candidatos a mescla</div>
        </div>
      `;

      const issues = reviewData.issues || [];
      document.getElementById('issuesCount').textContent = issues.length ? `(${issues.length})` : '';
      document.getElementById('issuesList').innerHTML = issues.length
        ? issues.map((issue, idx) => {
            const pillClass = issue.kind === 'orphan' ? 'pill-orphan' : 'pill-sparse';
            const graphHref = `/memory-graph?node=${encodeURIComponent(issue.nodeId)}`;
            const deleteBtn = issue.kind === 'orphan'
              ? `<button class="btn btn-danger" onclick="deleteOrphan(${idx})">Deletar</button>`
              : '';
            return `
              <div class="item" id="issue-${idx}">
                <div class="item-title">
                  ${esc(issue.title)}
                  <span class="pill ${pillClass}">${esc(issue.kind)}</span>
                </div>
                <div class="item-detail">${esc(issue.detail)}</div>
                <div class="actions">
                  <a class="btn" href="${graphHref}" style="text-decoration:none;" target="_blank">Ver no grafo</a>
                  ${deleteBtn}
                </div>
              </div>`;
          }).join('')
        : '<div class="empty">Nenhuma issue encontrada.</div>';

      const duplicates = reviewData.duplicateCandidates || [];
      document.getElementById('duplicatesCount').textContent = duplicates.length ? `(${duplicates.length})` : '';
      document.getElementById('duplicatesList').innerHTML = duplicates.length
        ? duplicates.map((pair, index) => `
            <div class="item" id="dup-${index}">
              <div class="item-title">
                ${esc(pair.left.name || pair.left.id)}
                <span class="pill pill-dup">${Math.round(pair.similarity * 100)}%</span>
                ${esc(pair.right.name || pair.right.id)}
              </div>
              <div class="item-detail">${esc(pair.left.type)} / ${esc(pair.right.type)}</div>
              <div class="actions">
                <button class="btn" onclick="mergePair(${index}, 'left')">
                  Mesclar em <strong>${esc(pair.left.name || pair.left.id)}</strong>
                </button>
                <button class="btn" onclick="mergePair(${index}, 'right')">
                  Mesclar em <strong>${esc(pair.right.name || pair.right.id)}</strong>
                </button>
              </div>
            </div>
          `).join('')
        : '<div class="empty">Sem pares duplicados no momento.</div>';
    }

    async function deleteOrphan(issueIdx) {
      const issue = reviewData?.issues?.[issueIdx];
      if (!issue) return;
      if (!confirm(`Deletar o nó "${issue.title}" (${issue.nodeId})?\n\nEsta ação é irreversível.`)) return;

      const btn = document.querySelector(`#issue-${issueIdx} .btn-danger`);
      if (btn) { btn.disabled = true; btn.textContent = 'Deletando...'; }

      try {
        const r = await newclawFetch(`/api/memory/nodes/${encodeURIComponent(issue.nodeId)}`, { method: 'DELETE' });
        const d = await r.json();
        if (!d.success) {
          showToast('Erro ao deletar: ' + (d.error || 'falha desconhecida'));
          if (btn) { btn.disabled = false; btn.textContent = 'Deletar'; }
          return;
        }
        document.getElementById(`issue-${issueIdx}`)?.remove();
        showToast(`Nó "${issue.title}" removido.`);
        // Reload stats silently
        const statsR = await newclawFetch('/api/memory/review');
        const statsD = await statsR.json();
        if (statsD.success) {
          reviewData = statsD.review;
          const s = reviewData.summary;
          document.getElementById('statsRow').querySelector('.stat-value').style.color = qualityColor(s.qualityScore);
        }
      } catch (e) {
        showToast('Erro: ' + (e.message || e));
        if (btn) { btn.disabled = false; btn.textContent = 'Deletar'; }
      }
    }

    async function mergePair(index, keepSide) {
      const pair = reviewData?.duplicateCandidates?.[index];
      if (!pair) return;
      const keepId   = keepSide === 'left' ? pair.left.id  : pair.right.id;
      const mergeId  = keepSide === 'left' ? pair.right.id : pair.left.id;
      const keepLabel  = keepSide === 'left' ? (pair.left.name  || pair.left.id)  : (pair.right.name || pair.right.id);
      const mergeLabel = keepSide === 'left' ? (pair.right.name || pair.right.id) : (pair.left.name  || pair.left.id);

      if (!confirm(`Mesclar "${mergeLabel}" em "${keepLabel}"?\n\nUm snapshot será criado antes da operação.`)) return;

      const card = document.getElementById(`dup-${index}`);
      const btns = card?.querySelectorAll('.btn');
      btns?.forEach(b => { b.disabled = true; });

      try {
        const r = await newclawFetch('/api/memory/merge', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ keepId, mergeId })
        });
        const d = await r.json();
        if (!d.success) {
          showToast('Erro ao mesclar: ' + (d.error || 'falha desconhecida'));
          btns?.forEach(b => { b.disabled = false; });
          return;
        }
        card?.remove();
        showToast(`Mescla concluída. Snapshot: ${d.snapshotId || 'criado'}`);
        await loadReview();
      } catch (e) {
        showToast('Erro: ' + (e.message || e));
        btns?.forEach(b => { b.disabled = false; });
      }
    }

    loadReview();
  </script>
</body>
</html>
