<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewClaw — Painel Cognitivo</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/shared.css">
  <link rel="stylesheet" href="/config/config.css">
</head>
<body>
  <div id="header-root"></div>
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-label" data-i18n="sidebar_operation">Operação</div>
      <nav id="sidebar-nav">
        <div class="nav-item active" data-page="dashboard">
          <span class="ni">📡</span><span>Dashboard</span>
        </div>
        <div class="nav-item" data-page="modelos">
          <span class="ni">🤖</span><span data-i18n="sidebar_models">Modelos</span>
        </div>
        <div class="nav-item" data-page="providers">
          <span class="ni">🔌</span><span>Providers</span>
        </div>
        <div class="nav-item" data-page="ferramentas">
          <span class="ni">🛠️</span><span data-i18n="sidebar_tools">Ferramentas</span>
        </div>
        <div class="nav-item" data-page="skills">
          <span class="ni">🎓</span><span>Skills</span>
          <span class="nav-badge" id="skillsBadge" style="display:none">0</span>
        </div>
        <div class="nav-item" data-page="integracoes">
          <span class="ni">🔌</span><span data-i18n="sidebar_integrations">Extensões</span>
        </div>
        <div class="nav-item" data-page="seguranca">
          <span class="ni">🔒</span><span data-i18n="sidebar_security">Segurança</span>
        </div>
        <div class="nav-item" data-page="avancado">
          <span class="ni">⚙️</span><span data-i18n="sidebar_advanced">Avançado</span>
        </div>
        <div class="nav-item" data-page="atualizacao">
          <span class="ni">⬆️</span><span data-i18n="sidebar_update">Atualização</span>
        </div>
        <div class="nav-item" data-page="backup">
          <span class="ni">💾</span><span data-i18n="sidebar_backup">Backup</span>
        </div>
      </nav>
      <div class="sidebar-footer">
        <button class="btn btn-primary"  id="btnSave"    data-i18n="save_btn">💾 Salvar</button>
        <button class="btn btn-warning"  id="btnRestart" data-i18n="restart_btn">🔄 Reiniciar</button>
      </div>
    </aside>

    <!-- Content -->
    <main class="content">
      <div id="page-view"></div>
    </main>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/shared.js"></script>
  <script type="module" src="/config/app.js"></script>
</body>
</html>
