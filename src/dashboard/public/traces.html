<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewClaw — Execution Panel</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/shared.css">
  <style>
    .main { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 16px; }
    .stat-label { font-size: 0.72rem; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 1.4rem; font-weight: 700; margin-top: 4px; }
    .stat-value.success { color: var(--success); } .stat-value.warning { color: var(--warning); }
    .stat-value.danger { color: var(--danger); } .stat-value.info { color: var(--accent); }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }
    .section { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 20px; }
    .section-title { font-size: 0.9rem; font-weight: 600; color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .trace-list { display: flex; flex-direction: column; gap: 10px; max-height: 500px; overflow-y: auto; }
    .trace-item { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 10px; padding: 14px; cursor: pointer; transition: all 0.2s; }
    .trace-item:hover { border-color: var(--accent); }
    .trace-item.active { border-color: var(--accent); background: var(--accent-bg); }
    .trace-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .trace-id { font-size: 0.72rem; color: var(--text-soft); font-family: monospace; }
    .trace-status { font-size: 0.72rem; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
    .trace-status.completed { background: rgba(74,222,128,0.15); color: var(--success); }
    .trace-status.running { background: rgba(96,165,250,0.15); color: var(--accent); }
    .trace-status.error { background: rgba(248,113,113,0.15); color: var(--danger); }
    .trace-status.max_iterations { background: rgba(251,191,36,0.15); color: var(--warning); }
    .trace-input { font-size: 0.85rem; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .trace-meta { display: flex; gap: 12px; font-size: 0.72rem; color: var(--text-soft); }
    .step-timeline { display: flex; flex-direction: column; gap: 0; }
    .step-item { display: flex; gap: 12px; position: relative; padding-bottom: 16px; }
    .step-item:last-child { padding-bottom: 0; }
    .step-line { width: 2px; background: var(--border-color); position: absolute; left: 15px; top: 32px; bottom: 0; }
    .step-item:last-child .step-line { display: none; }
    .step-dot { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; position: relative; z-index: 1; }
    .step-dot.decision { background: rgba(96,165,250,0.2); color: var(--accent); }
    .step-dot.tool_call { background: rgba(251,191,36,0.2); color: var(--warning); }
    .step-dot.tool_result { background: rgba(74,222,128,0.2); color: var(--success); }
    .step-dot.llm_call { background: rgba(168,85,247,0.2); color: #a855f7; }
    .step-dot.llm_response { background: rgba(14,165,233,0.2); color: var(--accent); }
    .step-dot.error { background: rgba(248,113,113,0.2); color: var(--danger); }
    .step-content { flex: 1; }
    .step-title { font-size: 0.85rem; font-weight: 500; }
    .step-detail { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
    .step-duration { font-size: 0.72rem; color: var(--text-soft); margin-top: 2px; }
    .step-data { font-size: 0.75rem; color: var(--text-soft); margin-top: 4px; background: var(--code-bg); padding: 8px; border-radius: 6px; font-family: monospace; max-height: 80px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
    .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
    .tool-card { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 10px; padding: 12px; display: flex; align-items: center; gap: 10px; }
    .tool-card .tool-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; background: var(--accent-bg); }
    .tool-card .tool-name { font-weight: 500; font-size: 0.85rem; }
    .tool-card .tool-desc { font-size: 0.72rem; color: var(--text-soft); }
    .tool-toggle { padding: 4px 10px; border-radius: 6px; font-size: 0.72rem; cursor: pointer; border: none; font-weight: 600; transition: all 0.2s; }
    .tool-toggle.on { background: rgba(248,113,113,0.15); color: var(--danger); }
    .tool-toggle.off { background: rgba(74,222,128,0.15); color: var(--success); }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; color: var(--text-soft); text-align: center; }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.5; }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <div id="header-root"></div>
  <div class="main">
    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="stat-label">Traces</div><div class="stat-value info" id="totalTraces">0</div></div>
      <div class="stat-card"><div class="stat-label" data-i18n="avg_duration_label">Avg Duration</div><div class="stat-value" id="avgDuration">—</div></div>
      <div class="stat-card"><div class="stat-label" data-i18n="completed_label">Completados</div><div class="stat-value success" id="completedCount">0</div></div>
      <div class="stat-card"><div class="stat-label" data-i18n="errors_label">Erros</div><div class="stat-value danger" id="errorCount">0</div></div>
    </div>
    <div class="two-col">
      <div class="section"><div class="section-title" data-i18n="traces_title">📋 Traces</div><div class="trace-list" id="traceList"><div class="empty-state"><div class="icon pulse">🧠</div><div data-i18n="waiting_msg">Aguardando...</div></div></div></div>
      <div class="section"><div class="section-title" data-i18n="detail_pane_title">🔍 Detail</div><div id="traceDetail"><div class="empty-state"><div class="icon">👆</div><div data-i18n="select_trace_msg">Selecione um trace</div></div></div></div>
    </div>
    <div class="section" style="margin-bottom:24px;"><div class="section-title" data-i18n="tools_title">🛠️ Tools</div><div class="tools-grid" id="toolsGrid"></div></div>
  </div>

  <script src="/shared.js"></script>
  <script>
    document.getElementById('header-root').innerHTML = newclawHeader('traces');
    newclawInitTheme();
    newclawApplyI18n();
    const toolIcons={exec_command:'💻',web_search:'🔍',file_ops:'📁',crypto_report:'📊',send_audio:'🔊'};
    let traces=[], selectedTraceId=null;
    async function loadTraces(){try{const r=await fetch('/api/traces');const d=await r.json();if(d.success){traces=d.traces;renderTraces();}}catch{}}
    async function loadStats(){try{const r=await fetch('/api/traces/stats');const d=await r.json();if(d.success){document.getElementById('totalTraces').textContent=d.stats.totalTraces;document.getElementById('avgDuration').textContent=d.stats.avgDurationMs?d.stats.avgDurationMs+'ms':'—';document.getElementById('completedCount').textContent=d.stats.byStatus.completed||0;document.getElementById('errorCount').textContent=(d.stats.byStatus.error||0)+(d.stats.byStatus.max_iterations||0);}}catch{}}
    async function loadTools(){try{const r=await fetch('/api/tools/status');const d=await r.json();if(d.success){document.getElementById('toolsGrid').innerHTML=d.tools.map(t=>{const icon=toolIcons[t.name]||'🔧';const badge=t.enabled?'<span class="badge badge-active">ON</span>':'<span class="badge" style="background:rgba(248,113,113,0.15);color:var(--danger)">OFF</span>';const danger=t.dangerous?'<span class="badge" style="background:rgba(251,191,36,0.15);color:var(--warning)">⚠️</span>':'';const btn=t.enabled?`<button class="tool-toggle on" onclick="toggleTool('${t.name}',false)">Disable</button>`:`<button class="tool-toggle off" onclick="toggleTool('${t.name}',true)">Enable</button>`;return`<div class="tool-card"><div class="tool-icon">${icon}</div><div style="flex:1"><div class="tool-name">${t.name} ${danger}${badge}</div><div class="tool-desc">${t.description}</div></div>${btn}</div>`;}).join('');}}catch{}}
    async function toggleTool(name,enable){const action=enable?'enable':'disable';try{await fetch(`/api/tools/${name}/${action}`,{method:'POST'});loadTools();}catch{}}
    function renderTraces(){const list=document.getElementById('traceList');if(!traces.length){list.innerHTML='<div class="empty-state"><div class="icon pulse">🧠</div><div>Aguardando...</div></div>';return;}list.innerHTML=traces.map(t=>{const time=new Date(t.startTime).toLocaleTimeString('pt-BR');const dur=t.totalDurationMs?t.totalDurationMs+'ms':'...';const input=t.userInput.length>60?t.userInput.slice(0,60)+'...':t.userInput;return`<div class="trace-item ${t.id===selectedTraceId?'active':''}" onclick="selectTrace('${t.id}')"><div class="trace-header"><span class="trace-id">${t.id}</span><span class="trace-status ${t.status}">${t.status}</span></div><div class="trace-input">${esc(input)}</div><div class="trace-meta"><span>⏱️ ${dur}</span><span>🕐 ${time}</span><span>📌 ${t.decision||'—'}</span><span>🔧 ${(t.steps||[]).length} steps</span></div></div>`;}).join('');}
    function selectTrace(id){selectedTraceId=id;const trace=traces.find(t=>t.id===id);if(!trace)return;renderTraces();const detail=document.getElementById('traceDetail');const steps=(trace.steps||[]).map(s=>{const icons={decision:'🎯',tool_call:'🔧',tool_result:'✅',llm_call:'🤖',llm_response:'💬',error:'❌',final:'🏁'};const icon=icons[s.type]||'•';const dur=s.durationMs?`<div class="step-duration">⏱️ ${s.durationMs}ms</div>`:'';const detailData=s.data?Object.entries(s.data).map(([k,v])=>`${k}: ${typeof v==='string'?v.slice(0,100):JSON.stringify(v).slice(0,100)}`).join('\n'):'';return`<div class="step-item"><div class="step-line"></div><div class="step-dot ${s.type}">${icon}</div><div class="step-content"><div class="step-title">${s.type.replace(/_/g,' ').toUpperCase()}</div><div class="step-detail">${fmtStep(s)}</div>${dur}${detailData?`<div class="step-data">${esc(detailData)}</div>`:''}</div></div>`;}).join('');const fr=trace.finalResponse?`<div style="margin-top:16px;padding:12px;background:rgba(74,222,128,0.1);border:1px solid var(--success);border-radius:8px;"><div style="font-size:0.75rem;color:var(--success);font-weight:600;margin-bottom:4px;">FINAL</div><div style="font-size:0.82rem;">${esc(trace.finalResponse.slice(0,500))}</div></div>`:'';detail.innerHTML=`<div style="margin-bottom:12px;font-size:0.85rem;color:var(--text-muted);"><strong style="color:var(--accent)">${trace.decision||'—'}</strong> · ${trace.taskType||'—'} · Confiança: ${((trace.confidence||0)*100).toFixed(0)}% · Provider: ${trace.provider||'—'}</div><div class="step-timeline">${steps}</div>${fr}`;}
    function fmtStep(s){const d=s.data||{};switch(s.type){case 'decision':return`${d.decision} (${d.reason||''})`;case 'tool_call':return`${d.tool}(${Object.entries(d.args||{}).map(([k,v])=>`${k}=${String(v).slice(0,30)}`).join(', ')})`;case 'tool_result':return`${d.tool}: ${d.success?'✓':'✗'} ${d.outputLength||0} chars`;case 'llm_call':return`${d.provider} (iter ${d.iteration||'?'})`;case 'llm_response':return`content=${d.hasContent} tools=${d.toolCallCount||0}`;default:return JSON.stringify(d).slice(0,80);}}
    function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
    function connectSSE(){const es=new EventSource('/api/stream');es.addEventListener('trace_start',()=>{loadTraces();loadStats();});es.addEventListener('trace_step',()=>{loadTraces();loadStats();});es.addEventListener('trace_complete',()=>{loadTraces();loadStats();});es.onerror=()=>{es.close();setTimeout(connectSSE,5000);};}
    loadTraces();loadStats();loadTools();connectSSE();setInterval(()=>{loadTraces();loadStats();},10000);
  </script>
</body>
</html>
