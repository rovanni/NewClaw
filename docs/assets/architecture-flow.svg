<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00b894"/>
    </linearGradient>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="gPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00d4aa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="680" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#00d4aa" font-size="20" font-weight="bold">🪐 NewClaw — Arquitetura &amp; Fluxo de Mensagem</text>

  <!-- ===== USER ===== -->
  <rect x="365" y="58" width="170" height="44" rx="22" fill="url(#gTeal)" filter="url(#shadow)"/>
  <text x="450" y="85" text-anchor="middle" fill="#0f172a" font-size="15" font-weight="bold">👤 Usuário</text>

  <!-- Arrow: User → Telegram -->
  <line x1="450" y1="102" x2="450" y2="138" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== TELEGRAM ===== -->
  <rect x="340" y="140" width="220" height="44" rx="8" fill="url(#gBlue)" filter="url(#shadow)"/>
  <text x="450" y="167" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="bold">📨 Telegram Bot API</text>

  <!-- Arrow: Telegram → AgentLoop -->
  <line x1="450" y1="184" x2="450" y2="218" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== AGENT LOOP (main box) ===== -->
  <rect x="160" y="220" width="580" height="200" rx="12" fill="#1e293b" stroke="#00d4aa" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="248" text-anchor="middle" fill="#00d4aa" font-size="16" font-weight="bold">🧠 AgentLoop</text>

  <!-- Context Compressor -->
  <rect x="180" y="260" width="160" height="36" rx="6" fill="#334155" stroke="#a78bfa" stroke-width="1"/>
  <text x="260" y="283" text-anchor="middle" fill="#c4b5fd" font-size="12">🗜️ ContextCompressor</text>

  <!-- Prompt Assembly -->
  <rect x="370" y="260" width="160" height="36" rx="6" fill="#334155" stroke="#38bdf8" stroke-width="1"/>
  <text x="450" y="283" text-anchor="middle" fill="#7dd3fc" font-size="12">📝 Prompt Assembly</text>

  <!-- Skill Learner -->
  <rect x="560" y="260" width="160" height="36" rx="6" fill="#334155" stroke="#f472b6" stroke-width="1"/>
  <text x="640" y="283" text-anchor="middle" fill="#f9a8d4" font-size="12">🎓 SkillLearner</text>

  <!-- LLM Call (center) -->
  <rect x="290" y="310" width="320" height="48" rx="24" fill="url(#gOrange)" filter="url(#shadow)"/>
  <text x="450" y="339" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="bold">🤖 LLM (Tool Calling Nativo)</text>

  <!-- Provider labels inside LLM -->
  <text x="450" y="354" text-anchor="middle" fill="#0f172a" font-size="10">Ollama → Gemini → DeepSeek → Groq</text>

  <!-- Arrow: AgentLoop → Tools -->
  <line x1="450" y1="420" x2="450" y2="452" stroke="#00d4aa" stroke-width="2" marker-end="url(#arrowTeal)"/>

  <!-- ===== TOOLS ROW ===== -->
  <rect x="30" y="455" width="840" height="100" rx="10" fill="#1e293b" stroke="#4ade80" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="475" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">🛠️ Ferramentas</text>

  <!-- Tool boxes -->
  <rect x="45" y="485" width="115" height="52" rx="6" fill="#334155" stroke="#38bdf8" stroke-width="1"/>
  <text x="102" y="507" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="bold">🌐 web_search</text>
  <text x="102" y="524" text-anchor="middle" fill="#94a3b8" font-size="9">CoinGecko, wttr.in</text>

  <rect x="175" y="485" width="115" height="52" rx="6" fill="#334155" stroke="#a78bfa" stroke-width="1"/>
  <text x="232" y="507" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">🧠 memory_search</text>
  <text x="232" y="524" text-anchor="middle" fill="#94a3b8" font-size="9">Embeddings + FTS5</text>

  <rect x="305" y="485" width="115" height="52" rx="6" fill="#334155" stroke="#f472b6" stroke-width="1"/>
  <text x="362" y="507" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="bold">✏️ memory_write</text>
  <text x="362" y="524" text-anchor="middle" fill="#94a3b8" font-size="9">Nós + Relações</text>

  <rect x="435" y="485" width="115" height="52" rx="6" fill="#334155" stroke="#4ade80" stroke-width="1"/>
  <text x="492" y="507" text-anchor="middle" fill="#86efac" font-size="11" font-weight="bold">🔊 send_audio</text>
  <text x="492" y="524" text-anchor="middle" fill="#94a3b8" font-size="9">Edge-TTS → OGG</text>

  <rect x="565" y="485" width="115" height="52" rx="6" fill="#334155" stroke="#fb923c" stroke-width="1"/>
  <text x="622" y="507" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="bold">⚡ exec_command</text>
  <text x="622" y="524" text-anchor="middle" fill="#94a3b8" font-size="9">Shell commands</text>

  <rect x="695" y="485" width="115" height="52" rx="6" fill="#334155" stroke="#00d4aa" stroke-width="1"/>
  <text x="752" y="507" text-anchor="middle" fill="#5eead4" font-size="11" font-weight="bold">📄 file_ops</text>
  <text x="752" y="524" text-anchor="middle" fill="#94a3b8" font-size="9">Read, Write, List</text>

  <!-- Arrow: Tools → Response -->
  <path d="M 450 555 L 450 580 L 780 580 L 780 340 L 740 340" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="680" y="575" fill="#94a3b8" font-size="10">resultado</text>

  <!-- ===== MEMORY (side) ===== -->
  <rect x="700" y="220" width="180" height="200" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="790" y="248" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">💾 Memória (SQLite)</text>

  <rect x="712" y="258" width="156" height="28" rx="4" fill="#334155"/>
  <text x="790" y="277" text-anchor="middle" fill="#c4b5fd" font-size="10">🧩 Nós (identity, fact...)</text>

  <rect x="712" y="292" width="156" height="28" rx="4" fill="#334155"/>
  <text x="790" y="311" text-anchor="middle" fill="#c4b5fd" font-size="10">🔗 Relações (prefers...)</text>

  <rect x="712" y="326" width="156" height="28" rx="4" fill="#334155"/>
  <text x="790" y="345" text-anchor="middle" fill="#c4b5fd" font-size="10">📊 Embeddings (nomic)</text>

  <rect x="712" y="360" width="156" height="28" rx="4" fill="#334155"/>
  <text x="790" y="379" text-anchor="middle" fill="#c4b5fd" font-size="10">📸 Snapshots</text>

  <!-- Arrow: AgentLoop ↔ Memory -->
  <line x1="740" y1="340" x2="700" y2="340" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ===== DASHBOARD (side) ===== -->
  <rect x="20" y="220" width="120" height="200" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="248" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold">🖥️ Dashboard</text>

  <text x="80" y="275" text-anchor="middle" fill="#7dd3fc" font-size="10">💬 Chat</text>
  <text x="80" y="295" text-anchor="middle" fill="#7dd3fc" font-size="10">⚙️ Config</text>
  <text x="80" y="315" text-anchor="middle" fill="#7dd3fc" font-size="10">🧠 Memory</text>
  <text x="80" y="335" text-anchor="middle" fill="#7dd3fc" font-size="10">🔗 Graph</text>
  <text x="80" y="355" text-anchor="middle" fill="#7dd3fc" font-size="10">📋 Traces</text>
  <text x="80" y="375" text-anchor="middle" fill="#7dd3fc" font-size="10">❓ Help</text>

  <!-- Arrow: Dashboard → AgentLoop -->
  <line x1="140" y1="320" x2="160" y2="320" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ===== RESPONSE FLOW ===== -->
  <!-- Arrow: AgentLoop → Response → User -->
  <path d="M 450 420 L 450 450" stroke="#00d4aa" stroke-width="2" marker-end="url(#arrowTeal)"/>

  <!-- ===== BOTTOM: Flow legend ===== -->
  <rect x="30" y="595" width="840" height="75" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="450" y="618" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="bold">Fluxo da Mensagem</text>

  <!-- Step 1 -->
  <circle cx="80" cy="645" r="12" fill="url(#gTeal)"/>
  <text x="80" y="649" text-anchor="middle" fill="#0f172a" font-size="10" font-weight="bold">1</text>
  <text x="110" y="649" fill="#e2e8f0" font-size="10">Usuário envia mensagem</text>

  <!-- Step 2 -->
  <circle cx="290" cy="645" r="12" fill="url(#gOrange)"/>
  <text x="290" y="649" text-anchor="middle" fill="#0f172a" font-size="10" font-weight="bold">2</text>
  <text x="320" y="649" fill="#e2e8f0" font-size="10">LLM decide: resposta ou ferramenta?</text>

  <!-- Step 3 -->
  <circle cx="540" cy="645" r="12" fill="url(#gGreen)"/>
  <text x="540" y="649" text-anchor="middle" fill="#0f172a" font-size="10" font-weight="bold">3</text>
  <text x="570" y="649" fill="#e2e8f0" font-size="10">Ferramenta executa → resultado</text>

  <!-- Step 4 -->
  <circle cx="770" cy="645" r="12" fill="url(#gPurple)"/>
  <text x="770" y="649" text-anchor="middle" fill="#0f172a" font-size="10" font-weight="bold">4</text>
  <text x="800" y="649" fill="#e2e8f0" font-size="10">Resposta em pt-BR</text>
</svg>