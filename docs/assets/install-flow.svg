<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="gStep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00b894"/>
    </linearGradient>
    <linearGradient id="gStart" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="gEnd" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowDown" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00d4aa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="720" rx="12" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#00d4aa" font-size="20" font-weight="bold">🪐 NewClaw — Fluxo de Instalação</text>
  <text x="400" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">curl -fsSL https://raw.githubusercontent.com/rovanni/NewClaw/main/install.sh | bash</text>

  <!-- Step 1 -->
  <rect x="150" y="78" width="500" height="52" rx="8" fill="#1e293b" stroke="#00d4aa" stroke-width="2" filter="url(#shadow2)"/>
  <circle cx="180" cy="104" r="16" fill="url(#gStep)"/>
  <text x="180" y="109" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="bold">1</text>
  <text x="210" y="98" fill="#e2e8f0" font-size="13" font-weight="bold">Verificar Sistema</text>
  <text x="210" y="118" fill="#94a3b8" font-size="10">Ubuntu Server, RAM, Disco, Internet</text>
  <rect x="540" y="88" width="96" height="24" rx="12" fill="#334155"/>
  <text x="588" y="104" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold">✓ AUTO</text>

  <!-- Arrow -->
  <line x1="400" y1="130" x2="400" y2="150" stroke="#00d4aa" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Step 2 -->
  <rect x="150" y="155" width="500" height="52" rx="8" fill="#1e293b" stroke="#00d4aa" stroke-width="2" filter="url(#shadow2)"/>
  <circle cx="180" cy="181" r="16" fill="url(#gStep)"/>
  <text x="180" y="186" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="bold">2</text>
  <text x="210" y="175" fill="#e2e8f0" font-size="13" font-weight="bold">Atualizar Ubuntu + Dependências</text>
  <text x="210" y="195" fill="#94a3b8" font-size="10">apt update, apt upgrade, curl, git, build-essential</text>
  <rect x="540" y="165" width="96" height="24" rx="12" fill="#334155"/>
  <text x="588" y="181" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold">✓ AUTO</text>

  <!-- Arrow -->
  <line x1="400" y1="207" x2="400" y2="227" stroke="#00d4aa" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Step 3 -->
  <rect x="150" y="232" width="500" height="52" rx="8" fill="#1e293b" stroke="#00d4aa" stroke-width="2" filter="url(#shadow2)"/>
  <circle cx="180" cy="258" r="16" fill="url(#gStep)"/>
  <text x="180" y="263" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="bold">3</text>
  <text x="210" y="252" fill="#e2e8f0" font-size="13" font-weight="bold">Instalar Node.js 22</text>
  <text x="210" y="272" fill="#94a3b8" font-size="10">NodeSource setup + npm (se necessário)</text>
  <rect x="540" y="242" width="96" height="24" rx="12" fill="#334155"/>
  <text x="588" y="258" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold">✓ AUTO</text>

  <!-- Arrow -->
  <line x1="400" y1="284" x2="400" y2="304" stroke="#00d4aa" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Step 4 -->
  <rect x="150" y="309" width="500" height="52" rx="8" fill="#1e293b" stroke="#00d4aa" stroke-width="2" filter="url(#shadow2)"/>
  <circle cx="180" cy="335" r="16" fill="url(#gStep)"/>
  <text x="180" y="340" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="bold">4</text>
  <text x="210" y="329" fill="#e2e8f0" font-size="13" font-weight="bold">Instalar Ollama + Baixar Modelo</text>
  <text x="210" y="349" fill="#94a3b8" font-size="10">ollama install → ollama pull glm-5:cloud</text>
  <rect x="540" y="319" width="96" height="24" rx="12" fill="#334155"/>
  <text x="588" y="335" text-anchor="middle" fill="#fb923c" font-size="9" font-weight="bold">⚡ ESCOLHA</text>

  <!-- Arrow -->
  <line x1="400" y1="361" x2="400" y2="381" stroke="#00d4aa" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Step 5 -->
  <rect x="150" y="386" width="500" height="52" rx="8" fill="#1e293b" stroke="#00d4aa" stroke-width="2" filter="url(#shadow2)"/>
  <circle cx="180" cy="412" r="16" fill="url(#gStep)"/>
  <text x="180" y="417" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="bold">5</text>
  <text x="210" y="406" fill="#e2e8f0" font-size="13" font-weight="bold">Clonar + Compilar NewClaw</text>
  <text x="210" y="426" fill="#94a3b8" font-size="10">git clone → npm install → npm run build</text>
  <rect x="540" y="396" width="96" height="24" rx="12" fill="#334155"/>
  <text x="588" y="412" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold">✓ AUTO</text>

  <!-- Arrow -->
  <line x1="400" y1="438" x2="400" y2="458" stroke="#00d4aa" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Step 6 (interactive) -->
  <rect x="150" y="463" width="500" height="52" rx="8" fill="#1e293b" stroke="#f472b6" stroke-width="2" filter="url(#shadow2)"/>
  <circle cx="180" cy="489" r="16" fill="url(#gEnd)"/>
  <text x="180" y="494" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">6</text>
  <text x="210" y="483" fill="#e2e8f0" font-size="13" font-weight="bold">🔑 Configurar Telegram Token + User ID</text>
  <text x="210" y="503" fill="#94a3b8" font-size="10">O instalador pergunta interativamente ou via --token / --user-id</text>
  <rect x="540" y="473" width="96" height="24" rx="12" fill="#4a1a2a"/>
  <text x="588" y="489" text-anchor="middle" fill="#f472b6" font-size="9" font-weight="bold">🔐 INTERATIVO</text>

  <!-- Arrow -->
  <line x1="400" y1="515" x2="400" y2="535" stroke="#00d4aa" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Step 7 -->
  <rect x="150" y="540" width="500" height="52" rx="8" fill="#1e293b" stroke="#00d4aa" stroke-width="2" filter="url(#shadow2)"/>
  <circle cx="180" cy="566" r="16" fill="url(#gStep)"/>
  <text x="180" y="571" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="bold">7</text>
  <text x="210" y="560" fill="#e2e8f0" font-size="13" font-weight="bold">Iniciar NewClaw</text>
  <text x="210" y="580" fill="#94a3b8" font-size="10">node bin/newclaw start --daemon</text>
  <rect x="540" y="550" width="96" height="24" rx="12" fill="#334155"/>
  <text x="588" y="566" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold">✓ AUTO</text>

  <!-- Arrow -->
  <line x1="400" y1="592" x2="400" y2="612" stroke="#00d4aa" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Step 8 -->
  <rect x="150" y="617" width="500" height="52" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2" filter="url(#shadow2)"/>
  <circle cx="180" cy="643" r="16" fill="url(#gStart)"/>
  <text x="180" y="648" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="bold">8</text>
  <text x="210" y="637" fill="#e2e8f0" font-size="13" font-weight="bold">🎉 Systemd + Firewall (opcional)</text>
  <text x="210" y="657" fill="#94a3b8" font-size="10">Iniciar com o sistema + abrir porta 3090</text>
  <rect x="540" y="627" width="96" height="24" rx="12" fill="#1e293b" stroke="#38bdf8" stroke-width="1"/>
  <text x="588" y="643" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="bold">⚡ OPCIONAL</text>

  <!-- Done -->
  <rect x="280" y="685" width="240" height="28" rx="14" fill="url(#gStep)" filter="url(#shadow2)"/>
  <text x="400" y="704" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="bold">🪐 NewClaw Rodando!</text>
</svg>